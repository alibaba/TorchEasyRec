name: Code Review
on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  review:
    runs-on: tzrec-codereview-runner
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: FetchCommit
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: RunCodeReview
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            /review
            IMPORTANT: Do NOT run any python scripts, pytest, or build commands.
            Only perform static code analysis based on the git diff.
            Post your feedback immediately using the available tools.
          claude_args: |
            --model ${{ secrets.ANTHROPIC_MODEL }}
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr *),Bash(git *)"
          show_full_output: true
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
