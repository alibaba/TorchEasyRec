syntax = "proto2";
package tzrec.protos;

import "tzrec/protos/module.proto";

message DINEncoder {
    // seq encoder name
    optional string name = 1;
    // sequence feature name
    required string input = 2;
    // mlp config for target attention score
    required MLP attn_mlp = 3;
    // maximum sequence length
    optional int32 max_seq_length = 6 [default = 0];
}

message SimpleAttention {
    // seq encoder name
    optional string name = 1;
    // sequence feature name
    required string input = 2;
    // maximum sequence length
    optional int32 max_seq_length = 6 [default = 0];
}

message PoolingEncoder {
    // seq encoder name
    optional string name = 1;
    // sequence feature name
    required string input = 2;
    // pooling type, sum or mean
    optional string pooling_type = 3 [default = 'mean'];
    // maximum sequence length
    optional int32 max_seq_length = 6 [default = 0];
}

message SelfAttentionEncoder {
    // seq encoder name
    optional string name = 1;
    // sequence feature name
    required string input = 2;
    // multihead_attn_dim must be divisible by num_heads
    optional int32 multihead_attn_dim = 3 [default = 512];
    // self attention num heads
    optional int32 num_heads = 4 [default = 8];
    // dropout for attn_output_weights
    optional float dropout = 5 [default = 0.0];
    // maximum sequence length
    optional int32 max_seq_length = 6 [default = 0];
}

message MultiWindowDINEncoder {
    // seq encoder name
    optional string name = 1;
    // sequence feature name
    required string input = 2;
    // time windows len
    required MLP attn_mlp = 3;
    // mlp config for target attention score
    repeated uint32 windows_len = 4;
}

message SeqEncoderConfig {
    // Field 5 (hstu_encoder) and the HSTUEncoder message were removed when
    // the legacy HSTU sequence encoder was replaced by the modern STU stack
    // (UIHPreprocessor + STUStack via HSTU in module.proto). The Python
    // class is gone, so the slot is reserved to prevent silent reuse.
    reserved 5;
    reserved "hstu_encoder";
    oneof seq_module {
        DINEncoder din_encoder = 1;
        SimpleAttention simple_attention = 2;
        PoolingEncoder pooling_encoder = 3;
        MultiWindowDINEncoder multi_window_din_encoder = 4;
        SelfAttentionEncoder self_attention_encoder = 6;
    }
}
