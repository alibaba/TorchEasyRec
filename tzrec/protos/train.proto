syntax = "proto2";
package tzrec.protos;

import "tzrec/protos/optimizer.proto";
import "tzrec/protos/feature.proto";

message GradScaler {
    // Initial scale factor
    optional float init_scale = 1 [default = 65536];
    // Factor by which the scale is multiplied during update
    // if no inf/NaN gradients occur for ``growth_interval`` consecutive iterations.
    optional float growth_factor = 2 [default = 2];
    // Factor by which the scale is multiplied during update
    // if inf/NaN gradients occur in an iteration.
    optional float backoff_factor = 3 [default = 0.5];
    // Number of consecutive iterations without inf/NaN gradients
    // that must occur for the scale to be multiplied by ``growth_factor``.
    optional uint32 growth_interval = 4 [default = 2000];
}

message GradClipping {
    // Clipping type: "norm", "value", or "none"
    optional string clipping_type = 1 [default = "none"];
    // Max gradient value/norm threshold
    optional float max_gradient = 2 [default = 1.0];
    // Norm type for gradient norm clipping (2.0 for L2, inf for max)
    optional float norm_type = 3 [default = 2.0];
    // Enable global gradient clipping for distributed training
    optional bool enable_global_grad_clip = 4 [default = false];
}

message FeatureStoreConfig {
    // FeatureStore control-plane region. An explicitly empty value falls back
    // to ALIBABA_CLOUD_REGION at runtime.
    required string region = 1;
    // Runtime credentials. Explicit values take precedence over the standard
    // ALIBABA_CLOUD_* environment variables. Persisted model artifacts replace
    // these required secret values with empty strings.
    required string access_key_id = 2;
    required string access_key_secret = 3;
    // FeatureDB data-plane credential pair. Explicit values take
    // precedence over FEATUREDB_USERNAME and FEATUREDB_PASSWORD.
    required string featuredb_username = 4;
    required string featuredb_password = 5;
    // Existing FeatureStore project name and target DynamicEmbedding FeatureView
    // name. The view is validated at startup and created when it does not exist.
    required string project_name = 6;
    required string feature_view_name = 7;
    // Existing FeatureStore entity associated with an automatically created
    // DynamicEmbedding FeatureView.
    required string feature_entity_name = 8;
    // Explicit FeatureDB version for this incremental training run. It must be
    // provisioned before upload starts; only positive-global-step dumps are
    // written to this version with MERGE. One project/view/version may have
    // only one active delta writer.
    required string version = 9;


    // Optional FeatureStore control-plane endpoint override.
    optional string endpoint = 10;
    optional string security_token = 11;
    // Maximum records submitted before each SDK write_flush() completion gate.
    optional uint32 upload_batch_size = 12 [default = 1000];
    // Total attempts per process for one step. All retries reuse the version;
    // each attempt durably reserves a newer monotonic ts range and fully replays
    // the step so incremental readers cannot miss a partial earlier attempt.
    optional uint32 max_retries = 13 [default = 3];
    optional uint32 retry_backoff_secs = 14 [default = 5];
    // Maximum time rank zero waits for every rank's atomic parquet shard.
    // With FeatureStore enabled, output_dir must be one stable shared POSIX
    // filesystem visible to rank zero across restarts and must support atomic
    // rename, fsync and advisory file locking.
    optional uint32 shard_wait_timeout_secs = 15 [default = 600];
    // Maximum time normal training shutdown waits for the uploader to drain.
    optional uint32 shutdown_timeout_secs = 16 [default = 600];
    // Apply back-pressure when too many completed dumps await publication.
    optional uint32 max_pending_steps = 17 [default = 32];
    optional uint32 poll_interval_secs = 18 [default = 1];
    // Creation settings used only when feature_view_name does not yet exist.
    optional uint32 feature_view_ttl_secs = 19 [default = 1296000];
    optional uint32 feature_view_shard_count = 20 [default = 20];
    optional uint32 feature_view_replication_count = 21 [default = 1];
}

message DeltaEmbeddingDumpConfig {
    // MC/ZCH features are not supported; use dynamicemb for delta dump.
    // Dump touched ids and their latest embedding every N training steps. Do not
    // set this together with dump_interval_minutes.
    // Larger intervals retain a longer id window in memory; auto compaction reduces
    // per-batch tensor buildup but unique ids still scale with the interval.
    optional uint32 dump_interval_steps = 1 [default = 1000];
    // output directory. default is ${model_dir}/delta_embedding_dump
    optional string output_dir = 2;
    // parquet file prefix
    optional string file_prefix = 3 [default = "delta_embedding"];
    // Presence enables durable, rank-zero background upload to FeatureStore.
    optional FeatureStoreConfig feature_store_config = 4;
    // Dump after this many elapsed minutes. The timer starts when training starts.
    // Do not set this together with dump_interval_steps.
    optional uint32 dump_interval_minutes = 5;
}

message TrainConfig {
    // embedding part optimizer
    required SparseOptimizer sparse_optimizer = 1;
    // dense part optimizer
    required DenseOptimizer dense_optimizer = 2;
    // number of steps to train models
    optional uint32 num_steps = 3;
    // number of epochs to train models
    optional uint32 num_epochs = 4;
    // step interval for saving checkpoint
    optional uint32 save_checkpoints_steps = 5 [default = 1000];
    // checkpoint to restore parameters from
    optional string fine_tune_checkpoint = 6;
    // checkpoint to restore parameters mapping, each line is {param name in current model}\\t{param name in old ckpt}
    optional string fine_tune_ckpt_param_map = 7;
    // the frequency the loss and lr will be logged during training
    optional uint32 log_step_count_steps = 8 [default = 100];
    // profiling or not
    optional bool is_profiling = 9 [default = false];
    // use tensorboard or not.
    optional bool use_tensorboard = 10 [default = true];
    // epoch interval for saving checkpoint
    optional uint32 save_checkpoints_epochs = 11;
    // the summaries to be saved in tensorboard, activated only when use_tensorboard=true,
    // possible values are: "loss", "learning_rate", "parameter", "global_gradient_norm", "gradient_norm", "gradient"
    // default values are ["loss", "learning_rate"]
    repeated string tensorboard_summaries = 12;
    // where to use torch.backends.cudnn.allow_tf32
    optional bool cudnn_allow_tf32 = 13 [default = true];
    // where to use torch.backends.cuda.matmul.allow_tf32
    optional bool cuda_matmul_allow_tf32 = 14 [default = false];
    // global embedding param constraints
    optional ParameterConstraints global_embedding_constraints = 15;
    // mixed precision dtype.
    optional string mixed_precision = 16;
    // grad_scaler dynamically estimates the scale factor each iteration.
    optional GradScaler grad_scaler = 17;
    // gradient accumulation steps
    optional uint32 gradient_accumulation_steps = 18;
    // dense gradient clipping config
    optional GradClipping grad_clipping = 19;
    // maximum number of recent checkpoints to keep; 0 keeps all.
    optional uint32 keep_checkpoint_max = 20 [default = 0];
    // save every N seconds of consumed event-time (e.g. kafka message timestamp),
    // aligned to the Unix epoch (not training epochs). 0 disables.
    optional uint32 save_checkpoints_timestamp_interval = 21 [default = 0];
    // absolute event-time targets (Unix-epoch seconds); save once when consumed
    // data crosses each. empty disables.
    repeated uint64 save_checkpoints_timestamps = 22;
    // fraction of workers (0,1] that must pass a boundary/target before a
    // timestamp checkpoint fires; default 0.5 (1.0 = all). outlier-robust.
    optional float save_checkpoints_timestamp_quorum = 23 [default = 0.5];
    // Configuring this field dumps changed sparse embedding rows during CUDA
    // training. Multi-GPU training writes one parquet shard per rank;
    // column-wise embedding sharding is not supported.
    optional DeltaEmbeddingDumpConfig delta_embedding_dump_config = 24;
    // TBD: qcomm config
}
