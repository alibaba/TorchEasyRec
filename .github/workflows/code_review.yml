# Claude Code Review Workflow
#
# Triggered when a review is requested on a PR.
# Uses stored OAuth credentials on self-hosted runner (no ANTHROPIC_API_KEY needed).
#
# ---- Runner One-Time Setup ----
# SSH into tzrec-codereview-runner as the runner user and run:
#
#   # Install Claude Code and bun
#   npm install -g @anthropic-ai/claude-code
#   npm install -g bun
#
#   # Clone claude-code-action for MCP inline comment server
#   git clone https://github.com/anthropics/claude-code-action.git /opt/claude-code-action
#   cd /opt/claude-code-action && npm install
#
#   # Login (stores OAuth credentials for headless use)
#   claude /login
#
#   # Verify headless mode works without API key
#   unset ANTHROPIC_API_KEY && unset ANTHROPIC_BASE_URL
#   claude -p "Say hello"
#
# If auth fails after a long period, re-run `claude /login` on the runner.
# Do NOT use --bare flag — it disables OAuth/keychain reads.
# ---- End Setup ----

name: Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: codereview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: tzrec-codereview-runner
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: FetchCommit ${{ github.event.pull_request.head.sha }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: RunCodeReview
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_REPO: ${{ github.repository }}
          REVIEW_OWNER: ${{ github.repository_owner }}
          REVIEW_REPO_NAME: ${{ github.event.repository.name }}
          REVIEW_PR_NUM: ${{ github.event.pull_request.number }}
          # No ANTHROPIC_API_KEY — uses stored OAuth from `claude /login` on the runner
        run: |
          set -euo pipefail

          # Verify MCP server prerequisites
          echo "=== MCP Server Diagnostics ==="
          which bun && bun --version || echo "WARN: bun not found"
          which npx && npx --version || echo "WARN: npx not found"
          ls -la /opt/claude-code-action/src/mcp/github-inline-comment-server.ts 2>&1 || echo "WARN: MCP server file not found"
          echo "=== End Diagnostics ==="

          # MCP config for inline comment server
          MCP_CONFIG_FILE=$(mktemp --suffix=.json)
          trap 'rm -f "$MCP_CONFIG_FILE"' EXIT
          cat > "$MCP_CONFIG_FILE" <<'MCPJSON'
          {
            "mcpServers": {
              "github_inline_comment": {
                "command": "npx",
                "args": ["tsx", "/opt/claude-code-action/src/mcp/github-inline-comment-server.ts"],
                "env": {
                  "GITHUB_TOKEN_PLACEHOLDER": "placeholder",
                  "REPO_OWNER_PLACEHOLDER": "placeholder",
                  "REPO_NAME_PLACEHOLDER": "placeholder",
                  "PR_NUMBER_PLACEHOLDER": "placeholder"
                }
              }
            }
          }
          MCPJSON
          # Replace placeholders with actual values (heredoc is single-quoted to avoid premature expansion)
          sed -i "s|GITHUB_TOKEN_PLACEHOLDER|${GITHUB_TOKEN}|g" "$MCP_CONFIG_FILE"
          sed -i "s|REPO_OWNER_PLACEHOLDER|${REVIEW_OWNER}|g" "$MCP_CONFIG_FILE"
          sed -i "s|REPO_NAME_PLACEHOLDER|${REVIEW_REPO_NAME}|g" "$MCP_CONFIG_FILE"
          sed -i "s|PR_NUMBER_PLACEHOLDER|${REVIEW_PR_NUM}|g" "$MCP_CONFIG_FILE"
          echo "MCP config:" && cat "$MCP_CONFIG_FILE"

          claude -p \
            --output-format stream-json \
            --verbose \
            --mcp-config "$MCP_CONFIG_FILE" \
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Read,Grep,Glob,Agent" \
            -- "/review-pr REPO: ${REVIEW_REPO} PR_NUMBER: ${REVIEW_PR_NUM}"
